name: Android Build Check

permissions:
  contents: read

on:
  push:
    branches: [ "master", "dev" ]
    tags: [ "v*" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Screenshots/**'
      - 'fastlane/**'
      - '**.md'
  pull_request:
    branches: [ "master", "dev" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Screenshots/**'
      - 'fastlane/**'
      - '**.md'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Android Lint
      run: ./gradlew lintDebug

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: sigil-debug-build-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGIL_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.jks"

    - name: Build Signed Release APK
      env:
        SIGIL_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
        SIGIL_KEYSTORE_PASSWORD: ${{ secrets.SIGIL_KEYSTORE_PASSWORD }}
        SIGIL_KEY_ALIAS: ${{ secrets.SIGIL_KEY_ALIAS }}
        SIGIL_KEY_PASSWORD: ${{ secrets.SIGIL_KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: sigil-release-${{ github.ref_name }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
