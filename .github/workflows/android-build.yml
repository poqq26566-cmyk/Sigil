name: Android Build Check

permissions:
  contents: read

on:
  push:
    branches: [ "master", "dev" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Screenshots/**'
      - 'fastlane/**'
      - '**.md'
      - '.github/workflows/**'
  pull_request:
    branches: [ "master", "dev" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Screenshots/**'
      - 'fastlane/**'
      - '**.md'
      - '.github/workflows/**'


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest
