name: Android Build Check

permissions:
  contents: read

on:
  push:
    branches: [ "master", "dev" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Screenshots/**'
      - 'fastlane/**'
      - '**.md'
  pull_request:
    branches: [ "master", "dev" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Screenshots/**'
      - 'fastlane/**'
      - '**.md'
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Android Lint
      run: ./gradlew lintDebug

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: sigil-debug-${{ github.ref_name }}-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
